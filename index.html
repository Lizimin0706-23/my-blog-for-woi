	<script>
		var darkmodeAutoSwitch = "time";
		function setDarkmode(enable){
			if (enable == true){
				$("html").addClass("darkmode");
			}else{
				$("html").removeClass("darkmode");
			}
			$(window).trigger("scroll");
		}
		function toggleDarkmode(){
			if ($("html").hasClass("darkmode")){
				setDarkmode(false);
				sessionStorage.setItem("Argon_Enable_Dark_Mode", "false");
			}else{
				setDarkmode(true);
				sessionStorage.setItem("Argon_Enable_Dark_Mode", "true");
			}
		}
		if (sessionStorage.getItem("Argon_Enable_Dark_Mode") == "true"){
			setDarkmode(true);
		}
		function toggleDarkmodeByPrefersColorScheme(media){
			if (sessionStorage.getItem('Argon_Enable_Dark_Mode') == "false" || sessionStorage.getItem('Argon_Enable_Dark_Mode') == "true"){
				return;
			}
			if (media.matches){
				setDarkmode(true);
			}else{
				setDarkmode(false);
			}
		}
		function toggleDarkmodeByTime(){
			if (sessionStorage.getItem('Argon_Enable_Dark_Mode') == "false" || sessionStorage.getItem('Argon_Enable_Dark_Mode') == "true"){
				return;
			}
			let hour = new Date().getHours();
			if (hour < 7 || hour >= 22){
				setDarkmode(true);
			}else{
				setDarkmode(false);
			}
		}
		if (darkmodeAutoSwitch == 'system'){
			var darkmodeMediaQuery = window.matchMedia("(prefers-color-scheme: dark)");
			darkmodeMediaQuery.addListener(toggleDarkmodeByPrefersColorScheme);
			toggleDarkmodeByPrefersColorScheme(darkmodeMediaQuery);
		}
		if (darkmodeAutoSwitch == 'time'){
			toggleDarkmodeByTime();
		}
		if (darkmodeAutoSwitch == 'alwayson'){
			setDarkmode(true);
		}

		function toggleAmoledDarkMode(){
			$("html").toggleClass("amoled-dark");
			if ($("html").hasClass("amoled-dark")){
				localStorage.setItem("Argon_Enable_Amoled_Dark_Mode", "true");
			}else{
				localStorage.setItem("Argon_Enable_Amoled_Dark_Mode", "false");
			}
		}
		if (localStorage.getItem("Argon_Enable_Amoled_Dark_Mode") == "true"){
			$("html").addClass("amoled-dark");
		}else if (localStorage.getItem("Argon_Enable_Amoled_Dark_Mode") == "false"){
			$("html").removeClass("amoled-dark");
		}
	</script>

<script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    // 异步获取一言 API 语录
    async function fetchQuotes() {
        try {
            // 获取 3 条随机语录进行循环
            const requests = [
                fetch('https://v1.hitokoto.cn/?c=d&c=i').then(res => res.json()),
                fetch('https://v1.hitokoto.cn/?c=h&c=j').then(res => res.json()),
                fetch('https://v1.hitokoto.cn/?c=k&c=b').then(res => res.json())
            ];
            const results = await Promise.all(requests);
            return results.map(item => item.hitokoto);
        } catch (e) {
            return ["未来是绝对不变的。再怎么挣扎，都无法改变故事最终的结局。"];
        }
    }

    // 初始化打字机效果
    fetchQuotes().then(sentences => {
        new Typed('#banner-typed', {
            strings: sentences,
            typeSpeed: 70,    // 打字速度
            backSpeed: 40,    // 退格速度
            backDelay: 2000,  // 每一句停顿 2 秒
            loop: true,       // 循环播放
            cursorChar: '|'   // 闪烁的光标
        });
    });
  });
</script>

<script>
// 1. 获取 Cloudflare 边缘节点和地理信息
fetch('https://www.cloudflare.com/cdn-cgi/trace')
    .then(res => res.text())
    .then(data => {
        const info = data.split('\n').reduce((obj, line) => {
            const [key, value] = line.split('=');
            if (key) obj[key] = value;
            return obj;
        }, {});
        
        const coloMap = { 'HKG': '香港', 'TPE': '台北', 'NRT': '东京', 'SGP': '新加坡', 'LAX': '洛杉矶', 'SJC': '圣何塞' };
        const nodeName = coloMap[info.colo] || info.colo;

        document.getElementById('node-info').innerHTML = 
            `现在为您提供服务的服务器是 ${info.colo} 🚩 城市: ${nodeName}, IP: ${info.ip}`;
        
        document.getElementById('visitor-geo').innerHTML = 
            `您来自 ${info.loc} 🚩, 通过 ${info.http} 协议连接`;
    });

// 2. 运行时间统计
function show_blog_runtime() {
    window.setTimeout("show_blog_runtime()", 1000);
    var start = new Date("2024/01/01 00:00:00"); // 这里改成你想显示的建站日期
    var now = new Date();
    var diff = now.getTime() - start.getTime();
    var days = Math.floor(diff / (24 * 3600 * 1000));
    var hours = Math.floor((diff % (24 * 3600 * 1000)) / (3600 * 1000));
    var mins = Math.floor((diff % (3600 * 1000)) / (60 * 1000));
    var secs = Math.floor((diff % (60 * 1000)) / 1000);
    document.getElementById('runtime-display').innerHTML = 
        `本博客已稳定运行 ${days}天 ${hours}小时 ${mins}分 ${secs}秒`;
}
show_blog_runtime();
</script>
</html>
